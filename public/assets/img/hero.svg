<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#2e3267"/>
        </linearGradient>
    </defs>
    <rect width="600" height="400" fill="url(#bg)"/>
    <!-- Código decorativo -->
    <rect x="80" y="80" width="200" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="80" y="110" width="160" height="12" rx="6" fill="rgba(255,255,255,0.2)"/>
    <rect x="80" y="140" width="180" height="12" rx="6" fill="rgba(255,255,255,0.15)"/>
    <rect x="320" y="80" width="200" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
    <rect x="320" y="110" width="160" height="12" rx="6" fill="rgba(255,255,255,0.2)"/>
    <rect x="320" y="140" width="180" height="12" rx="6" fill="rgba(255,255,255,0.15)"/>
    <!-- Laptop icon -->
    <rect x="150" y="200" width="300" height="180" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="175" y="220" width="250" height="140" rx="4" fill="rgba(255,255,255,0.05)"/>
    <!-- Terminal lines -->
    <rect x="195" y="240" width="120" height="6" rx="3" fill="#00bf86"/>
    <rect x="195" y="260" width="90" height="6" rx="3" fill="#f7c94b"/>
    <rect x="195" y="280" width="100" height="6" rx="3" fill="#6c63ff"/>
    <rect x="195" y="300" width="70" height="6" rx="3" fill="#f75842"/>
    <rect x="270" y="345" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
    <rect x="195" y="345" width="60" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
    <!-- Curly braces -->
    <text x="300" y="185" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle">&lt;/&gt;</text>
</svg>
