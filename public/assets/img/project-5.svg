<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
    <defs>
        <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0078D4"/>
            <stop offset="100%" stop-color="#005a9e"/>
        </linearGradient>
    </defs>
    <rect width="640" height="360" fill="url(#g5)"/>
    <!-- Server icon -->
    <rect x="220" y="90" width="200" height="50" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="320" y="120" font-family="monospace" font-size="16" font-weight="700" fill="white" text-anchor="middle">.NET Core</text>
    <!-- Database icon -->
    <ellipse cx="320" cy="200" rx="80" ry="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="240" y="200" width="160" height="50" rx="0" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="320" y="230" font-family="monospace" font-size="13" font-weight="600" fill="white" text-anchor="middle">SQL Server</text>
    <line x1="320" y1="140" x2="320" y2="180" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="4"/>
    <text x="320" y="285" font-family="system-ui" font-size="13" fill="white" text-anchor="middle" opacity="0.6">.NET + SQL Server + EF Core</text>
</svg>
