<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
    <defs>
        <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6772E5"/>
            <stop offset="100%" stop-color="#32325D"/>
        </linearGradient>
    </defs>
    <rect width="640" height="360" fill="url(#g6)"/>
    <!-- Shopping cart icon -->
    <rect x="160" y="100" width="80" height="50" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="200" y="130" font-family="system-ui" font-size="12" fill="white" text-anchor="middle" opacity="0.8">🛒</text>
    <!-- Arrow -->
    <text x="260" y="135" font-family="system-ui" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">→</text>
    <!-- Server -->
    <rect x="280" y="100" width="80" height="50" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="320" y="130" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" opacity="0.8">.NET</text>
    <!-- Arrow -->
    <text x="380" y="135" font-family="system-ui" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">→</text>
    <!-- Payment -->
    <rect x="400" y="100" width="80" height="50" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="440" y="130" font-family="system-ui" font-size="12" fill="white" text-anchor="middle" opacity="0.8">Stripe</text>
    <!-- Database below -->
    <ellipse cx="320" cy="210" rx="60" ry="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="260" y="210" width="120" height="35" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="320" y="232" font-family="monospace" font-size="11" font-weight="600" fill="white" text-anchor="middle">SQL Server</text>
    <line x1="320" y1="150" x2="320" y2="195" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3"/>
    <text x="320" y="280" font-family="system-ui" font-size="13" fill="white" text-anchor="middle" opacity="0.6">Ecommerce Full Stack</text>
</svg>
